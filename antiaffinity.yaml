apiVersion: v1
kind: Pod
metadata:
  name: anti-affinity-pod
  labels:
    app: my-app
spec:
  containers:
  - name: my-container
    image: nginx

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - my-app
        topologyKey: "kubernetes.io/hostname"
